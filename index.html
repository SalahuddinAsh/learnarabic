<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Reading Stars</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Reading Stars">
  <meta name="theme-color" content="#0d9488">
</head>
<body>

  <!-- ============ SETUP SCREEN ============ -->
  <section id="screen-setup" class="screen active">
    <div class="card">
      <div class="setup-top">
        <h1 id="t-title">نجوم القراءة ⭐</h1>
        <div class="lang-row" id="lang-row">
          <button class="lang-chip" data-lang="ar" type="button">ع</button>
          <button class="lang-chip" data-lang="en" type="button">EN</button>
          <button class="lang-chip" data-lang="de" type="button">DE</button>
          <button class="lang-chip sound-btn" id="btn-sound" type="button">🔊</button>
        </div>
      </div>

      <div class="setup-group">
        <h2 id="t-level">المستوى</h2>
        <div class="chip-row" id="level-row">
          <button class="chip op-chip" data-level="letters" type="button"><span class="op-sym">أ ب</span><span class="op-name" data-t="lvlLetters">الحروف</span></button>
          <button class="chip op-chip" data-level="words"   type="button"><span class="op-sym">🐱</span><span class="op-name" data-t="lvlWords">الكلمات</span></button>
          <button class="chip op-chip" data-level="sent"    type="button"><span class="op-sym">📖</span><span class="op-name" data-t="lvlSent">الجمل</span></button>
        </div>
      </div>

      <div class="setup-group">
        <h2 id="t-mode">اللعبة</h2>
        <div class="chip-row" id="mode-row">
          <button class="chip op-chip" data-mode="match" type="button"><span class="op-sym">🖼️</span><span class="op-name" data-t="modeMatch">الصورة والحرف</span></button>
          <button class="chip op-chip" data-mode="connect" type="button"><span class="op-sym">🔗</span><span class="op-name" data-t="modeConnect">وصّل</span></button>
          <button class="chip op-chip" data-mode="build" type="button"><span class="op-sym">🧩</span><span class="op-name" data-t="modeBuild">رتّب</span></button>
          <button class="chip op-chip" data-mode="read"  type="button"><span class="op-sym">🎤</span><span class="op-name" data-t="modeRead">اقرأ لي</span></button>
        </div>
      </div>

      <div class="setup-group" id="letters-group">
        <h2 id="t-letters">الحروف المختارة</h2>
        <div class="chip-row letters" id="letters-row" dir="rtl"></div>
        <button class="chip all-chip" id="btn-all" type="button">الكل</button>
      </div>

      <div class="setup-group">
        <h2 id="t-count">كم عدد الأسئلة؟</h2>
        <div class="chip-row" id="count-row"></div>
      </div>

      <div class="setup-group" id="timer-group">
        <h2 id="t-timer">المؤقت</h2>
        <div class="chip-row" id="timer-row">
          <button class="chip" data-timed="1" type="button" data-t="timerOn">⏱️ يعمل</button>
          <button class="chip" data-timed="0" type="button" data-t="timerOff">🚫 بدون</button>
        </div>
      </div>

      <div class="setup-group" id="game-group">
        <h2 id="t-game">نقاط فتح اللعبة</h2>
        <div class="chip-row" id="game-row">
          <button class="chip" data-game="0" type="button" data-t="gameOff">🚫 إيقاف</button>
          <button class="chip" data-game="500" type="button" dir="ltr">500</button>
          <button class="chip" data-game="700" type="button" dir="ltr">700</button>
          <button class="chip" data-game="800" type="button" dir="ltr">800</button>
          <button class="chip" data-game="900" type="button" dir="ltr">900</button>
        </div>
        <p class="group-note" id="game-note"></p>
      </div>

      <button id="btn-start" class="big-btn" type="button" disabled>!ابدأ 🚀</button>
      <p id="setup-hint" class="hint"></p>
      <p class="version" id="app-version" dir="ltr"></p>
    </div>
  </section>

  <!-- ============ QUIZ SCREEN ============ -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-wrap">
      <div class="quiz-top">
        <button id="btn-quit" class="quit-btn" type="button">✕</button>
        <div class="progress-text" id="progress-text" dir="ltr">1 / 10</div>
        <div class="score-pill" id="score-pill" dir="ltr">⭐ 0</div>
      </div>

      <div class="timebar-row" id="timebar-row" dir="ltr">
        <div class="timebar-track"><div class="timebar" id="timebar"></div></div>
        <div class="time-left" id="time-left">15</div>
      </div>

      <div class="question-area">
        <div class="instruction" id="instruction"></div>
        <div class="prompt-row">
          <div class="prompt" id="prompt" dir="rtl"></div>
        </div>
        <div class="built" id="built" dir="rtl" hidden></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="cards" id="cards" dir="rtl"></div>

      <div class="builder" id="builder" hidden>
        <div class="tiles" id="tiles" dir="rtl"></div>
      </div>

      <div class="connect" id="connect" hidden dir="rtl">
        <div class="c-col" id="c-pics"></div>
        <div class="c-col" id="c-words"></div>
      </div>

      <div class="order" id="order" hidden>
        <div class="slots" id="slots" dir="rtl"></div>
        <div class="pool" id="pool" dir="rtl"></div>
      </div>

      <div class="grade" id="grade" hidden dir="ltr">
        <button id="btn-bad" class="grade-btn bad" type="button">✗</button>
        <button id="btn-good" class="grade-btn good" type="button">✓</button>
      </div>
    </div>
  </section>

  <!-- ============ RESULTS SCREEN ============ -->
  <section id="screen-results" class="screen">
    <div class="card results-card">
      <div class="stars" id="stars">⭐⭐⭐</div>
      <h1 id="t-score">نتيجتك</h1>
      <div class="final-score" id="final-score" dir="ltr">850 <span class="of-1000">/ 1000</span></div>
      <div class="sub-score" id="sub-score" dir="ltr">✓ 9 / 10</div>
      <div class="best-line" id="best-line"></div>
      <p class="cheer" id="cheer"></p>

      <div class="missed" id="missed-wrap" hidden>
        <h2 id="t-review">راجع هذه</h2>
        <ul id="missed-list" dir="rtl"></ul>
      </div>

      <button id="btn-play-game" class="big-btn game-btn" type="button" hidden>🪂</button>
      <button id="btn-again" class="big-btn" type="button">العب مرة أخرى 🔁</button>
      <button id="btn-settings" class="big-btn secondary" type="button">غيّر الإعدادات ⚙️</button>
    </div>
  </section>

  <!-- ============ FALLING PICTURES GAME ============ -->
  <section id="screen-game" class="screen">
    <div class="game-wrap">
      <div class="quiz-top">
        <button id="btn-game-quit" class="quit-btn" type="button">✕</button>
        <div class="progress-text" id="game-lives" dir="ltr">❤️❤️❤️</div>
        <div class="score-pill" id="game-score" dir="ltr">🪂 0</div>
      </div>

      <div class="sky" id="sky">
        <div class="game-over" id="game-over" hidden>
          <div class="go-title" id="go-title">انتهت اللعبة! 🪂</div>
          <div class="go-score" id="go-score" dir="ltr">0</div>
          <div class="best-line" id="go-best"></div>
          <button class="big-btn" id="btn-game-done" type="button">OK</button>
        </div>
      </div>

      <div class="lkeys" id="game-letters" dir="rtl"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
